apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: production
  labels:
    app.kubernetes.io/name: stateless-node-api
    app.kubernetes.io/part-of: node-api-application
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: stateless-node-api
  template:
    metadata:
      labels:
        app: stateless-node-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - stateless-node-api
              topologyKey: "kubernetes.io/hostname"
              
      containers:
      - name: api-container
        image: artifactory.internal.corp/docker-local/stateless-node-api:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: api-web
          containerPort: 3000
          protocol: TCP
          
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
            
        startupProbe:
          httpGet:
            path: /healthz
            port: api-web
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 10
          
        livenessProbe:
          httpGet:
            path: /healthz
            port: api-web
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
          
        readinessProbe:
          httpGet:
            path: /healthz
            port: api-web
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 2
          
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
          
      volumes:
      - name: tmp-volume
        emptyDir: {}
